# uDDNS — Docker Compose / Podman Compose
#
#   docker compose up -d        (or: podman-compose up -d)
#
# Configuration comes from a local .env file (copy .env.example and fill it in).
# Per-host checkpoints persist in a named volume so restarts don't re-push
# unchanged records.
services:
  uddns:
    build: .
    image: uddns:latest
    container_name: uddns
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UDDNS_STATE_FILE: /data/state.json
      UDDNS_HISTORY_FILE: /data/history.json
      UDDNS_HEALTH: '1'
      UDDNS_HEALTH_HOST: 127.0.0.1
      UDDNS_HEALTH_PORT: '3924'
    volumes:
      - uddns-state:/data
    # The core updater only makes outbound HTTPS/DNS requests.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3924/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  uddns-state:
