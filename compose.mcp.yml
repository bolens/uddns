# Optional MCP HTTP overlay:
#   docker compose -f compose.yml -f compose.mcp.yml up -d
services:
  uddns:
    command: ['dist/mcp.js', '--transport=http']
    environment:
      UDDNS_MCP_TRANSPORT: http
      UDDNS_MCP_HOST: 0.0.0.0
      UDDNS_MCP_PORT: '3923'
      # Required when binding non-loopback — set in .env:
      # UDDNS_MCP_AUTH_TOKEN=
      # UDDNS_MCP_TLS_CERT=/certs/cert.pem
      # UDDNS_MCP_TLS_KEY=/certs/key.pem
    ports:
      - '3923:3923'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3923/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
