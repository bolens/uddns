# Optional MCP HTTP overlay for loopback/sidecar access:
#   docker compose -f compose.yml -f compose.mcp.yml up -d
# Binds 127.0.0.1 inside the container (no published ports). Prefer setting
# UDDNS_MCP_AUTH_TOKEN; ALLOW_INSECURE_LOOPBACK is for local sidecar only.
# For published non-loopback MCP, set UDDNS_MCP_HOST=0.0.0.0 plus auth token and
# TLS cert/key mounts — see docs/mcp.md.
services:
  uddns:
    command: ['dist/mcp.js', '--transport=http']
    environment:
      UDDNS_MCP_TRANSPORT: http
      UDDNS_MCP_HOST: 127.0.0.1
      UDDNS_MCP_PORT: '3923'
      UDDNS_MCP_ALLOW_INSECURE_LOOPBACK: 'true'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3923/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
