name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      tests: ${{ steps.filter.outputs.tests }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - 'app.ts'
              - 'mcp.ts'
              - 'cli.ts'
              - 'lib/**'
              - 'tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'vite.config.ts'
              - '.fallowrc.json'
              - '.npmrc'
              - 'Dockerfile'
              - '.dockerignore'
              - 'compose.yml'
              - 'compose.*.yml'
            tests:
              - 'tests/**'
            docs:
              - 'README.md'
              - 'docs/**'
              - '.env.example'
              - 'examples/**'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'scripts/**'

  check:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (lint + typecheck)
        run: pnpm run check

  test:
    name: Test (${{ matrix.group.name }})
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: providers
            paths: tests/providers
          - name: config
            paths: tests/config.test.ts tests/defaults.test.ts tests/hosts.test.ts
          - name: core
            paths: tests/app.test.ts tests/cli.test.ts tests/config-file.test.ts tests/data-path.test.ts tests/domain-host.test.ts tests/errors.test.ts tests/health-config.test.ts tests/history.test.ts tests/http.test.ts tests/init.test.ts tests/ip-discovery-config.test.ts tests/ip-policy.test.ts tests/ip.test.ts tests/log.test.ts tests/notify.test.ts tests/once.test.ts tests/result.test.ts tests/runtime.test.ts tests/scaffold.test.ts tests/sensitive.test.ts tests/side-server.test.ts tests/state.test.ts tests/telemetry.test.ts tests/updater.test.ts tests/url-policy.test.ts
          - name: mcp
            paths: tests/mcp-entry.test.ts tests/mcp-session.test.ts tests/mcp.test.ts
          - name: docs
            paths: tests/docs.test.ts
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (${{ matrix.group.name }})
        run: >-
          pnpm run test -- ${{ matrix.group.paths }} --reporter=blob
          --outputFile=.vitest-reports/blob-${{ matrix.group.name }}.json --coverage
        env:
          VITEST_PARTIAL_COVERAGE: '1'

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.group.name }}
          path: .vitest-reports/*
          retention-days: 1
          include-hidden-files: true

  test-report:
    needs: [changes, test]
    if: ${{ !cancelled() && (needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          path: .vitest-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge test reports and coverage
        run: pnpm run test -- --merge-reports --coverage

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Dead code
        run: pnpm run lean:check

  config-dry-run:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Dry-run example configuration
        uses: ./.github/actions/config-dry-run
        with:
          config-file: examples/uddns.multi.yaml
